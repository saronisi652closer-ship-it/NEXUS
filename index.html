<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>スマホアプリ風ホーム画面</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  background:
    radial-gradient(circle at top, rgba(114,180,255,0.28), transparent 30%),
    linear-gradient(180deg, #08111d 0%, #16273d 100%);
  color: #fff;
}

.phone {
  width: min(420px, 100%);
  min-height: 820px;
  border-radius: 36px;
  padding: 16px;
  background: #0d1625;
  box-shadow: 0 30px 60px rgba(0,0,0,0.45);
  border: 2px solid rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
}

.wallpaper {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(65,180,255,0.32), transparent 26%),
    radial-gradient(circle at 80% 30%, rgba(104,255,182,0.22), transparent 22%),
    radial-gradient(circle at 50% 80%, rgba(255,212,84,0.18), transparent 24%),
    linear-gradient(180deg, #163056 0%, #1f4b73 50%, #0f2138 100%);
}

.phone-inner {
  position: relative;
  z-index: 1;
}

.status {
  display: flex;
  justify-content: space-between;
  padding-bottom: 10px;
  font-weight: bold;
}

.hero h1 {
  margin: 0;
  font-size: 26px;
}

.hero p {
  font-size: 13px;
  color: rgba(255,255,255,0.8);
}

.github-btn {
  margin-top: 12px;
  display: inline-block;
  padding: 8px 14px;
  border-radius: 20px;
  background: #24292e;
  color: #fff;
  font-size: 13px;
  text-decoration: none;
}

.search {
  margin: 16px 0;
  padding: 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.15);
}

.app-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.app-icon-wrap {
  text-align: center;
  text-decoration: none;
  color: white;
}

.icon {
  width: 70px;
  height: 70px;
  border-radius: 18px;
  margin: 0 auto 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.i1 { background: #4da6ff; }
.i2 { background: #2ecc71; }
.i3 { background: #ff8c42; }
.i4 { background: #9b59b6; }
.i5 { background: #ff5c7a; }

.app-label {
  font-size: 11px;
}

.widget {
  margin-top: 20px;
  padding: 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
}

.widget-item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
}
</style>
</head>

<body>

<div class="phone">
<div class="wallpaper"></div>

<div class="phone-inner">

<div class="status">
  <div>9:41</div>
  <div>🔋79%</div>
</div>

<div class="hero">
  <h1>My Apps</h1>
  <p>アプリ一覧ホーム</p>

  <!-- ★ GitHubリンク -->
  <a class="github-btn" href="https://github.com/saronisi652closer-ship-it" target="_blank">
    GitHubを見る
  </a>
</div>

<div class="search">🔎 アプリ検索</div>

<div class="app-grid">

<a class="app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/my-app/" target="_blank">
  <div class="icon i1">趣</div>
  <div class="app-label">趣味管理</div>
</a>

<a class="app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/rinto-region/" target="_blank">
  <div class="icon i2">ミ</div>
  <div class="app-label">ミトモン</div>
</a>

<a class="app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/-/" target="_blank">
  <div class="icon i3">メ</div>
  <div class="app-label">メモ</div>
</a>

<a class="app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/Multitasking/" target="_blank">
  <div class="icon i4">タ</div>
  <div class="app-label">タスク</div>
</a>

<a class="app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/shopping-list/" target="_blank">
  <div class="icon i5">在</div>
  <div class="app-label">在庫</div>
</a>

<a class="app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/duplicate-photo-checker/" target="_blank">
  <div class="icon i1">写</div>
  <div class="app-label">重複写真</div>
</a>
  
</div>

<div class="widget">
  <div class="widget-item"><span>よく使う</span><strong>ミトモン</strong></div>
  <div class="widget-item"><span>生活</span><strong>在庫管理</strong></div>
</div>

</div>
</div>

</body>
</html>
