<!DOCTYPE html><html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スマホアプリ風ホーム画面</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at top, rgba(114,180,255,0.28), transparent 30%),
        linear-gradient(180deg, #08111d 0%, #16273d 100%);
      color: #fff;
    }
    .phone {
      width: min(420px, 100%);
      min-height: 820px;
      border-radius: 36px;
      padding: 16px;
      background: #0d1625;
      box-shadow: 0 30px 60px rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .wallpaper {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(65,180,255,0.32), transparent 26%),
        radial-gradient(circle at 80% 30%, rgba(104,255,182,0.22), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(255,212,84,0.18), transparent 24%),
        linear-gradient(180deg, #163056 0%, #1f4b73 50%, #0f2138 100%);
    }
    .phone-inner {
      position: relative;
      z-index: 1;
    }
    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 4px 14px;
      font-size: 14px;
      font-weight: 700;
    }
    .hero {
      padding: 8px 4px 14px;
    }
    .hero h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    .hero p {
      margin: 8px 0 0;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
    }
    .search {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 12px 14px;
      margin-bottom: 18px;
      font-size: 14px;
      color: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.78);
      margin: 8px 4px 12px;
      letter-spacing: 0.4px;
    }
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px 10px;
    }
    .app-link {
      text-decoration: none;
      color: inherit;
    }
    .app-icon-wrap {
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 26px;
      color: white;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }
    .i1 { background: linear-gradient(135deg, #68b7ff, #295eff); }
    .i2 { background: linear-gradient(135deg, #6ce28c, #179a5d); }
    .i3 { background: linear-gradient(135deg, #ffb04d, #ff6a3d); }
    .i4 { background: linear-gradient(135deg, #d77dff, #7f52ff); }
    .i5 { background: linear-gradient(135deg, #ff7aa2, #f03168); }
    .app-label {
      font-size: 11px;
      line-height: 1.3;
      color: #fff;
      word-break: break-word;
    }
    .widget {
      margin-top: 24px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    .widget h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .widget-list {
      display: grid;
      gap: 10px;
    }
    .widget-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
    }
    .dock {
      margin-top: 24px;
      padding: 10px;
      border-radius: 28px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.14);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      backdrop-filter: blur(12px);
    }
    .dock .icon {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      margin-bottom: 0;
      font-size: 22px;
    }
    .dock .app-icon-wrap {
      display: flex;
      justify-content: center;
    }
    @media (max-width: 420px) {
      .phone { min-height: 100vh; border-radius: 0; width: 100%; }
      body { padding: 0; }
      .icon { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="wallpaper"></div>
    <div class="phone-inner">
      <div class="status">
        <div>9:41</div>
        <div>📶 🔋 79%</div>
      </div><div class="hero">
    <h1>My Apps</h1>
    <p>GitHubで作ったアプリを、ホーム画面風にまとめた入口ページ</p>
  </div>

  <div class="search">🔎 アプリを検索</div>

  <div class="section-title">アプリ</div>
  <div class="app-grid">
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/my-app/" target="_blank">
      <div class="icon i1">趣</div>
      <div class="app-label">趣味管理</div>
    </a>
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/rinto-region/" target="_blank">
      <div class="icon i2">ミ</div>
      <div class="app-label">ミトモン</div>
    </a>
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/-/" target="_blank">
      <div class="icon i3">メ</div>
      <div class="app-label">オフラインメモ</div>
    </a>
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/Multitasking/" target="_blank">
      <div class="icon i4">タ</div>
      <div class="app-label">マルチタスク</div>
    </a>
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/shopping-list/" target="_blank">
      <div class="icon i5">在</div>
      <div class="app-label">在庫管理</div>
    </a>
  </div>

  <div class="widget">
    <h3>よく使うアプリ</h3>
    <div class="widget-list">
      <div class="widget-item"><span>ゲーム</span><strong>ミトモン</strong></div>
      <div class="widget-item"><span>生活</span><strong>在庫管理</strong></div>
      <div class="widget-item"><span>趣味</span><strong>趣味管理アプリ</strong></div>
    </div>
  </div>

  <div class="dock">
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/my-app/" target="_blank"><div class="icon i1">趣</div></a>
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/rinto-region/" target="_blank"><div class="icon i2">ミ</div></a>
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/shopping-list/" target="_blank"><div class="icon i5">在</div></a>
    <a class="app-link app-icon-wrap" href="https://saronisi652closer-ship-it.github.io/-/" target="_blank"><div class="icon i3">メ</div></a>
  </div>
</div>

  </div>
</body>
</html>
